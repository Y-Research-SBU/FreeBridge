    - torchdiffeq
    - scikit-learn
    - pytorch-lightning==1.8.5.post0
    - hydra-core==1.2.0
    - hydra-submitit-launcher==1.2.0
    - hydra_colorlog==1.2.0
    - click
    - wandb
    - biopython
    - pyevtk
    - ipympl
    - geomloss
    - colored-traceback
    - POT
    - termcolor
    - laspy
    - gdown
